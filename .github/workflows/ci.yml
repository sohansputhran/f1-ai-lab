# .github/workflows/ci.yml
#
# CI Pipeline for f1-ai-lab — Project 1: F1 Race Predictor
#
# Analogy: This is our automated scrutineering bay.
# Every push to main (or any pull request targeting main)
# triggers this workflow on GitHub's servers.

name: Project 1 · CI

# ── Triggers ────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
    paths:
      # Only re-run CI when Project 1 files actually change.
      # No point running ML tests because you edited project2's README.
      - "project1_race_predictor/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "project1_race_predictor/**"
      - ".github/workflows/ci.yml"

# ── Jobs ────────────────────────────────────────────────────────────────────
jobs:
  test:
    name: Lint & Test — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    # Matrix strategy: run the pipeline against multiple Python versions.
    # Like testing your car setup on both a dry and damp track.
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      # Step 1: Check out the repo onto the GitHub runner machine
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Install the exact Python version we want
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          # Cache pip downloads so repeat runs are faster
          cache: "pip"
          cache-dependency-path: project1_race_predictor/requirements.txt

      # Step 3: Install all project dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r project1_race_predictor/requirements.txt

      # Step 4: Lint with flake8 — enforces PEP 8 code style.
      # Like the FIA's technical regulations — your code must comply.
      - name: Lint with flake8
        run: |
          pip install flake8
          # Stop the build if there are Python syntax errors or undefined names
          flake8 project1_race_predictor/src --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warn on style issues but don't fail the build (max line length 88)
          flake8 project1_race_predictor/src --count --max-line-length=88 --statistics

      # Step 5: Run pytest with coverage report.
      # --cov generates a coverage report — what % of your src code is tested.
      - name: Run tests with pytest
        run: |
          pytest project1_race_predictor/tests/ \
            --cov=project1_race_predictor/src \
            --cov-report=term-missing \
            -v